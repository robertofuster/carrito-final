<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Producto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">

</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

<h3>Nuevo Producto</h3>

<a href="productos.html" class="btn btn-secondary mb-3">← Volver</a>

<form id="formProducto">

<input id="name" class="form-control mb-2" placeholder="Nombre">

<input id="price" type="number" class="form-control mb-2" placeholder="Precio">

<select id="category" class="form-control mb-2"></select>

<input type="file" id="image" class="form-control mb-2">

<img id="preview" style="max-width:150px; display:none;">

<button class="btn btn-primary">Guardar</button>

</form>

</div>

<div id="loader" class="loader d-none">
  <div class="spinner-border text-primary"></div>
</div>

<div id="toastGlobal" class="toast position-fixed bottom-0 end-0 m-3"></div>

<script src="../js/auth.js"></script>
<script src="../js/navbar.js"></script>
<script src="../js/loader.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/producto-form.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
